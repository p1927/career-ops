# portals.yml — Career-Ops Portal Scanner Configuration
# Adapted for Minimax/executor-gateway setup in openclaw-sandbox.
#
# Supports: Greenhouse, Ashby, Lever (ATS APIs)
#           LinkedIn jobs guest feed, Remotive API, Wellfound search
#
# Usage: node scan.mjs

# ── Title filter ─────────────────────────────────────────────────────────────
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # AI/ML roles
    - "AI"
    - "ML"
    - "LLM"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    - "Voice AI"
    - "Conversational AI"
    - "Machine Learning"
    - "Applied AI"
    - "AI Engineer"
    - "AI Research"
    # Engineering roles
    - "Platform Engineer"
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Staff Engineer"
    - "Principal Engineer"
    - "Forward Deployed"
    - "Customer Engineer"
    - "Integration Engineer"
    # Product / Automation
    - "Product Manager"
    - "Technical PM"
    - "Automation"
    - "GTM Engineer"
    - "Internal Tools"
  negative:
    - "Junior"
    - "Intern"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"

# ── Portal-level queries ──────────────────────────────────────────────────────
# These scan broad job boards rather than individual company pages.
# Runs after tracked_companies. Disable any you don't want.

portal_queries:

  # Remotive — remote-first jobs, clean JSON API
  - type: remotive
    search_query: "AI engineer"
    limit: 50
    enabled: true

  - type: remotive
    search_query: "machine learning"
    limit: 50
    enabled: true

  - type: remotive
    search_query: "LLM"
    limit: 30
    enabled: true

  # LinkedIn — public guest feed (last 24h, f_TPR=r86400)
  # Note: LinkedIn may throttle repeated requests. Keep scan interval >= 12h.
  - type: linkedin
    search_query: "AI engineer"
    location: "Worldwide"
    enabled: true

  - type: linkedin
    search_query: "LLM engineer"
    location: "Remote"
    enabled: true

  - type: linkedin
    search_query: "machine learning engineer"
    location: "Remote"
    enabled: true

  # Wellfound (AngelList) — startup-focused
  # Note: Returns HTML; results may be limited without authentication.
  - type: wellfound
    search_query: "ai-engineer"
    enabled: true

  - type: wellfound
    search_query: "machine-learning"
    enabled: true

